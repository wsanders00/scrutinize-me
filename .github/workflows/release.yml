name: release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  bundle:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e .
      - run: python -m unittest discover -s tests -v
      - run: python -m pip install --force-reinstall .
      - run: python scripts/smoke_installed_package.py
      - run: python -m scrutinize_me_skill build --output-dir dist --release-tag "${GITHUB_REF_NAME}"
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
